openapi: 3.0.3
info:
  title: Dawn & Dusk Member Checkout & Orders (Frontend View)
  version: 0.1.0
  description: 仅供前端对接参考；以后端已实现接口为准，不新增后端改动。
servers:
  - url: /api
    description: Vite dev 代理前缀
paths:
  /member/cart:
    get:
      summary: 获取当前会员购物车
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
    delete:
      summary: 清空购物车
      responses:
        '200':
          description: 成功
  /member/cart/items:
    post:
      summary: 加入购物车（同款累加）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '200':
          description: 返回更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
  /member/cart/items/{productId}:
    put:
      summary: 更新数量
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: 返回更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
    delete:
      summary: 移除单个商品
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 返回更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
  /member/checkout/preview:
    post:
      summary: 结算预览（含优惠券可用性、价格、光阴值预估）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutPreviewRequest'
      responses:
        '200':
          description: 预览数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutPreviewResponse'
  /member/checkout/submit:
    post:
      summary: 提交结算，创建订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutSubmitRequest'
      responses:
        '200':
          description: 返回订单号与支付金额
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSubmitResponse'
  /member/checkout/pay:
    post:
      summary: 模拟支付
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayOrderRequest'
      responses:
        '200':
          description: 支付成功后的状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayOrderResponse'
  /member/coupons/usable:
    get:
      summary: 获取可用/不可用优惠券
      parameters:
        - name: amount
          in: query
          required: true
          schema:
            type: number
      responses:
        '200':
          description: 优惠券列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsableCouponsResponse'
  /member/orders:
    get:
      summary: 订单列表（支持状态筛选、分页）
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: status
          in: query
          schema:
            type: string
            description: 逗号分隔的状态
      responses:
        '200':
          description: 列表与分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
  /member/orders/{orderNo}:
    get:
      summary: 订单详情
      parameters:
        - name: orderNo
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailResponse'
  /member/orders/{orderNo}/cancel:
    post:
      summary: 取消待支付订单
      parameters:
        - name: orderNo
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 取消结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'

components:
  schemas:
    CartItem:
      type: object
      properties:
        productId: { type: integer }
        name: { type: string }
        image: { type: string }
        unitPrice: { type: number }
        quantity: { type: integer, minimum: 1, maximum: 99 }
        subtotal: { type: number }
    CartResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
        summary:
          type: object
          properties:
            totalQty: { type: integer }
            totalAmount: { type: number }
    AddToCartRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer }
        quantity: { type: integer, minimum: 1, maximum: 99 }
    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 1, maximum: 99 }
    CheckoutItem:
      type: object
      properties:
        productId: { type: integer }
        quantity: { type: integer }
    CheckoutPreviewRequest:
      type: object
      required: [items, source]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CheckoutItem' }
        source:
          type: string
          enum: [cart, buyNow]
        couponId:
          type: integer
          nullable: true
    Coupon:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        discountAmount: { type: number }
        threshold: { type: number }
        validFrom: { type: string, format: date-time }
        validTo: { type: string, format: date-time }
        usable: { type: boolean }
        reason: { type: string }
    CheckoutPreviewResponse:
      type: object
      properties:
        items:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/CheckoutItem'
              - type: object
                properties:
                  name: { type: string }
                  image: { type: string }
                  unitPrice: { type: number }
                  subtotal: { type: number }
                  available: { type: boolean }
                  reason: { type: string }
        coupons:
          type: object
          properties:
            usable:
              type: array
              items: { $ref: '#/components/schemas/Coupon' }
            unusable:
              type: array
              items: { $ref: '#/components/schemas/Coupon' }
        price:
          type: object
          properties:
            itemsAmount: { type: number }
            discountAmount: { type: number }
            payAmount: { type: number }
        pointsEstimate: { type: number }
    CheckoutSubmitRequest:
      type: object
      required: [items, source, pickupType, contact]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CheckoutItem' }
        source:
          type: string
          enum: [cart, buyNow]
        pickupType:
          type: string
          enum: [SELF_PICKUP, DELIVERY]
        contact:
          type: object
          properties:
            name: { type: string }
            phone: { type: string }
        addressId: { type: integer }
        addressInput: { type: string }
        couponId: { type: integer }
        remark: { type: string, maxLength: 120 }
    CheckoutSubmitResponse:
      type: object
      properties:
        orderNo: { type: string }
        status: { type: string }
        payAmount: { type: number }
        pickupCode: { type: string }
        pointsEstimate: { type: number }
    PayOrderRequest:
      type: object
      required: [orderNo]
      properties:
        orderNo: { type: string }
    PayOrderResponse:
      type: object
      properties:
        orderNo: { type: string }
        status: { type: string }
        pickupCode: { type: string }
        pointsEstimate: { type: number }
    UsableCouponsResponse:
      type: object
      properties:
        usable:
          type: array
          items: { $ref: '#/components/schemas/Coupon' }
        unusable:
          type: array
          items: { $ref: '#/components/schemas/Coupon' }
    OrderListItem:
      type: object
      properties:
        orderNo: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        itemsPreview: { type: string }
        itemsAmount: { type: number }
        discountAmount: { type: number }
        payAmount: { type: number }
    OrderListResponse:
      type: object
      properties:
        list:
          type: array
          items: { $ref: '#/components/schemas/OrderListItem' }
        page:
          type: object
          properties:
            total: { type: integer }
            page: { type: integer }
            size: { type: integer }
    OrderDetailResponse:
      type: object
      properties:
        orderNo: { type: string }
        status: { type: string }
        timeline:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              time: { type: string, format: date-time }
              description: { type: string }
        pickupInfo:
          type: object
          properties:
            type: { type: string }
            name: { type: string }
            phone: { type: string }
            pickupCode: { type: string }
            address: { type: string }
        coupon:
          type: object
          properties:
            name: { type: string }
            discountAmount: { type: number }
        items:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              unitPrice: { type: number }
              quantity: { type: integer }
              subtotal: { type: number }
              image: { type: string }
        priceBreakdown:
          type: object
          properties:
            itemsAmount: { type: number }
            discountAmount: { type: number }
            payAmount: { type: number }
        pointsEarned: { type: number }
        pointsEstimate: { type: number }
        remark: { type: string }
        createdAt: { type: string, format: date-time }
    CancelOrderResponse:
      type: object
      properties:
        status: { type: string }
